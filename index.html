<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etch A Sketch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
  <link href = "style.css" rel = "stylesheet"/>
</head>
<body>
  <div class = "all">
   <div>
    <h1>Etch-A-Sketch</h1>
    <p class="instructions">
      Enter a grid size (1–100), then click "Generate" to build the grid — 
      it only updates when you click the button, not as you type. 
      Hover over squares to draw, and use the buttons below to switch colors or modes.
      </p>
 <div class = "btns">
        <label for="grid-size">Enter Grid Size:</label>
        <input type="number" id="grid-size" name="grid-size" value = "16" min="1" max="100" placeholder="16" class ="grid-size">
        <button class = "generate-grid">Create Grid</button>
        <button class = "reset">Reset</button>
        <button class = "eraser">Eraser</button>
        <button>Choose A Color
             <input type="color" class="color-picker" value="#000000">
        </button>
       
        <button class = "random">Random color</button>
        <button class = "rainbow">Rainbow color</button>
    </div>
  </div> 

 
   
<div class = "grid-container">

    </div>
  </div>
  
  <script src = "index.js"></script>
</body>
</html>
